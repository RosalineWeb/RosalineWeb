outputs: dist/github-contribution-grid-snake.svg


name: Generate Snake

on:
permissions:
  contents: write
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: Platane/snk@v3
  with:
    github_user_name: ${{ github.repository_owner }}
    outputs: dist/github-contribution-grid-snake.svg
    
- uses: peaceiris/actions-gh-pages@v3
  with:
    github_token: ${{ secrets.GITHUB_TOKEN }}
    publish_dir: dist
    publish_branch: output

          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
